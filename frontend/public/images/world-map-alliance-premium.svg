<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#2b0b45"/>
      <stop offset="55%" stop-color="#1e0735"/>
      <stop offset="100%" stop-color="#130320"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="42%" r="42%">
      <stop offset="0%" stop-color="#ffd28a" stop-opacity="0.22"/>
      <stop offset="30%" stop-color="#f2a8ff" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="smallGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .outline { fill: none; stroke: rgba(255,255,255,0.16); stroke-width: 2.3; stroke-linejoin: round; stroke-linecap: round; }
      .fill { fill: rgba(255,255,255,0.03); stroke: rgba(255,255,255,0.12); stroke-width: 1.4; stroke-linejoin: round; }
      .route { fill: none; stroke: rgba(255,203,123,0.22); stroke-width: 2.2; stroke-linecap: round; }
      .route2 { fill: none; stroke: rgba(205,147,255,0.12); stroke-width: 1.8; stroke-linecap: round; }
      .node { fill: rgba(255,222,141,0.70); }
      .node2 { fill: rgba(229,177,255,0.45); }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#halo)"/>

